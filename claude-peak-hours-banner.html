<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Peak Hours</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', monospace, sans-serif;
      background: transparent;
      padding: 0;
    }

    .banner {
      width: 100%;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.5s, border-color 0.5s;
      border: 1.5px solid;
    }

    .banner.off-peak { background: #edf7ed; border-color: #4caf50; }
    .banner.peak     { background: #fff3e0; border-color: #ff9800; }
    .banner.weekend  { background: #e8f4fd; border-color: #2196f3; }

    .dot {
      width: 11px; height: 11px; border-radius: 50%;
      flex-shrink: 0; animation: pulse 2s infinite;
    }

    .off-peak .dot { background: #4caf50; }
    .peak .dot     { background: #ff9800; }
    .weekend .dot  { background: #2196f3; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    .content { flex: 1; min-width: 0; }

    .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.04em; white-space: nowrap;
    }

    .off-peak .title { color: #2e7d32; }
    .peak .title     { color: #e65100; }
    .weekend .title  { color: #0d47a1; }

    .subtitle { font-size: 12px; margin-top: 2px; color: #555; }

    .time-block {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 19px; font-weight: 500; color: #111;
      flex-shrink: 0; letter-spacing: -0.5px;
    }

    .next-label {
      font-size: 11px; color: #888;
      text-align: right; margin-top: 2px;
    }

    .schedule {
      margin-top: 10px; display: flex; gap: 6px;
      align-items: center; flex-wrap: wrap;
    }

    .slot {
      font-size: 11px; border-radius: 5px; padding: 2px 8px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .slot.peak-slot {
      background: #ffe0b2; color: #bf360c;
      border: 1px solid #ffcc80;
    }

    .slot.good-slot {
      background: #dcedc8; color: #1b5e20;
      border: 1px solid #aed581;
    }

    .sep { font-size: 11px; color: #bbb; }
  </style>
</head>
<body>

<div class="banner" id="banner">
  <div class="dot" id="dot"></div>
  <div class="content">
    <div class="title" id="title"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="schedule">
      <span class="slot peak-slot" id="peak-slot"></span>
      <span class="sep">·</span>
      <span class="slot good-slot" id="good-slot"></span>
    </div>
  </div>
  <div>
    <div class="time-block" id="clock"></div>
    <div class="next-label" id="next-info"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
